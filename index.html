<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthetic User Tests</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3344;
    --text: #e4e6ed;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: rgba(108,140,255,0.12);
    --green: #06d6a0;
    --green-dim: rgba(6,214,160,0.12);
    --yellow: #ffd166;
    --yellow-dim: rgba(255,209,102,0.12);
    --red: #ff6b6b;
    --red-dim: rgba(255,107,107,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .report-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    display: block;
  }

  .report-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .report-card .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .report-card .site-name {
    font-size: 16px;
    font-weight: 600;
  }

  .report-card .date {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .report-card .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 16px;
    white-space: nowrap;
  }

  .pill-persona {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
  }

  .pill-task {
    background: var(--surface2);
    color: var(--text-muted);
  }

  .pill-verdict {
    font-weight: 600;
  }

  .pill-good { background: var(--green-dim); color: var(--green); }
  .pill-mixed { background: var(--yellow-dim); color: var(--yellow); }
  .pill-bad { background: var(--red-dim); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 12px;
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .container { padding: 24px 16px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Synthetic <span>User Tests</span></h1>
  <p class="subtitle">Persona-based UX evaluations — click a report to view full results</p>

  <div class="report-list" id="reportList">
    <div class="empty-state" id="emptyState">
      <div class="icon">🧪</div>
      <p>No test reports yet. Add HTML reports to the <code>/reports</code> folder.</p>
    </div>
  </div>

  <div class="footer">
    Powered by Synthetic User Testing Skill
  </div>
</div>

<script>
  /*
    Report metadata registry.
    The publish script appends entries here automatically.
    Each entry: { file, site, date, personas, task, verdict, verdictType }
    verdictType: "good" | "mixed" | "bad"
  */
  const reports = [
    // ── REPORT_ENTRIES_START ──
    { file: "synthetic-test-vacation-engine-2026-03-19.html", site: "Vacation Engine", date: "2026-03-19", personas: ["Olivia (HR Admin)"], task: "4-Scenario Time Off Usability", verdict: "Promising with gaps", verdictType: "mixed" },
    { file: "synthetic-test-simployer-2026-03-17.html", site: "Simployer.com", date: "2026-03-17", personas: ["Olivia (HR Admin)"], task: "HRIS AI Evaluation", verdict: "Conditional", verdictType: "mixed" },
    { file: "synthetic-test-sia-mvp-2026-03-17.html", site: "Sia MVP", date: "2026-03-17", personas: ["Robert (Employee)"], task: "Report Sick Leave", verdict: "Completed with friction", verdictType: "mixed" },
    // ── REPORT_ENTRIES_END ──
  ];

  const list = document.getElementById('reportList');
  const empty = document.getElementById('emptyState');

  if (reports.length > 0) {
    empty.style.display = 'none';

    // Sort newest first
    reports.sort((a, b) => b.date.localeCompare(a.date));

    reports.forEach(r => {
      const card = document.createElement('a');
      card.className = 'report-card';
      card.href = `reports/${r.file}`;

      const verdictClass = r.verdictType === 'good' ? 'pill-good'
        : r.verdictType === 'bad' ? 'pill-bad' : 'pill-mixed';

      const personaPills = (r.personas || [])
        .map(p => `<span class="pill pill-persona">${p}</span>`)
        .join('');

      card.innerHTML = `
        <div class="card-top">
          <span class="site-name">${r.site}</span>
          <span class="date">${r.date}</span>
        </div>
        <div class="card-meta">
          ${personaPills}
          <span class="pill pill-task">${r.task}</span>
          <span class="pill pill-verdict ${verdictClass}">${r.verdict}</span>
        </div>
      `;
      list.appendChild(card);
    });
  }
</script>
</body>
</html>
